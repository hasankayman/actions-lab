name: Hello World
 
on:
  push:
    branches:
      - main
 
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print a greeting
        run: echo "Hello from GitHub Actions!"
 
      - name: Show the date
        run: date
 
      - name: Show the runner OS
        run: echo "Running on $RUNNER_OS"
